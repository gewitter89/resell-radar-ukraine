version: "3.8"

services:
  db:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-resell}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-resell_pass}
      POSTGRES_DB: ${POSTGRES_DB:-resell_radar}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-resell} -d ${POSTGRES_DB:-resell_radar}"]
      interval: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - radar-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - radar-net

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - radar-net

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb local/${MINIO_BUCKET:-resell-radar} --ignore-existing;
      exit 0;
      "
    networks:
      - radar-net

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    ports:
      - "8191:8191"
    environment:
      LOG_LEVEL: info
    restart: unless-stopped
    networks:
      - radar-net

  backend:
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
      DISABLE_INTERNAL_SCHEDULER: "true"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - radar-net

  worker:
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
    command: celery -A app.celery_app worker -l info -P gevent -c 10
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - radar-net

  beat:
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
    command: celery -A app.celery_app beat -l info
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - radar-net

volumes:
  postgres_data:
  minio_data:

networks:
  radar-net:
    driver: bridge
