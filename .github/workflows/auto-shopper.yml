name: Auto Shopper - Grocery Prices

on:
  schedule:
    # 9:00 Kyiv (UTC+3 = 06:00 UTC)
    - cron: '0 6 * * *'
    # 13:00 Kyiv (UTC+3 = 10:00 UTC)
    - cron: '0 10 * * *'
    # 18:00 Kyiv (UTC+3 = 15:00 UTC)
    - cron: '0 15 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  run-shopper:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Auto Shopper
        env:
          PYTHONIOENCODING: utf-8
        run: python auto_shopper.py --test
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          BROWSERACT_API_KEY: ${{ secrets.BROWSERACT_API_KEY }}
          OLX_BEARER_TOKEN: ${{ secrets.OLX_BEARER_TOKEN }}
